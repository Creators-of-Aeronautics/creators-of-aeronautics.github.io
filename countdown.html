<!DOCTYPE html>
<html>
    <head>
        <title>Countdown to Create Aeronautics</title>

        <meta name="description" content="It's ready.">
        <meta name="keywords" content="create aeronautics, create, create mod, minecraft">
        <meta name="robots" content="index, follow">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta name="language" content="English">


        <link rel="icon" href="/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" type="text/css" href="style.css">
        <style>
            body {
                margin: 0;
            }

            #title {
                display: block;
                margin: auto;
                padding-top: 10%;
                width: 45%;
                filter: drop-shadow(0px 0px 20px var(--shadow-color));
            }

            #countdown {
                text-align: center;
                font-size: 4vw;
                color: whitesmoke;
                filter: drop-shadow(5px 5px var(--shadow-color));
            }

            #particle-canvas {
                filter: drop-shadow(2px 2px 10px var(--shadow-color));
                position: fixed;
            }

            .disc {
                width: 5%;
                position: fixed;
                image-rendering: pixelated;
                filter: drop-shadow(2px 2px 10px var(--shadow-color));
            }   

            @media screen and (max-width: 100vh) {
                #title {
                    padding-top: 20%;
                    width: 90%;
                }

                #countdown {
                    font-size: 10vw;
                }

                .disc {
                    width: 15%;
                }
            }
            
        </style>
    </head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <body>
        <img id="title" src="./resources/images/title.png">
        <h1 id="countdown"></h1>
        <script src="/countdown.js"></script>
    </body>
</html>
